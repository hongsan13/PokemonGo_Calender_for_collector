<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#18354a"><title>PoGO Collector Calendar</title><link rel="manifest" href="manifest.webmanifest"><link rel="stylesheet" href="style.css"></head><body><header><div><p class="eyebrow">TOKYO / COLLECTION MODE</p><h1>PoGO Collector Calendar</h1><p>日本・関東での再入手性を基準に、イベントをコレクション価値で評価する。</p></div><button id="refreshBtn">更新</button></header><section class="summary" id="summary"></section><nav class="filters"><button class="active" data-filter="all">すべて</button><button data-filter="ongoing">開催中</button><button data-filter="high">★4以上</button><button data-filter="limited">限定重視</button><button id="settingsBtn">評価設定</button><button id="icsBtn">ICS出力</button></nav><main><div id="status" class="status">読み込み中…</div><div id="events" class="event-list"></div></main><dialog id="settingsDialog"><form method="dialog"><h2>コレクション評価設定</h2><p class="muted">チェック済み要素は、該当イベントの優先度を下げる。</p><label><input type="checkbox" id="ownedRegionals"> 海外地域限定の通常色は概ね確保済み</label><label><input type="checkbox" id="ownedCostumes"> 衣装・帽子の通常色は1体で十分</label><label><input type="checkbox" id="ownedUnown"> アンノーン通常全28種を確保済み</label><label><input type="checkbox" id="pvpOff" checked> PvP価値を評価しない</label><label><input type="checkbox" id="tokyoPenalty" checked> 東京で恒常入手可能なら大幅減点</label><div class="dialog-actions"><button value="cancel">閉じる</button><button value="default" id="saveSettings">保存</button></div></form></dialog><footer><p>データ: Leek Duck → ScrapedDuck。非公式・非商用の個人用プロトタイプ。</p><p id="updated"></p></footer><script src="app.js"></script></body></html>
