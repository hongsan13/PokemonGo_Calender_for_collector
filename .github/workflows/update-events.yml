name: Update Pokemon GO Events

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch ScrapedDuck events
        run: |
          mkdir -p docs/data
          curl -fL --retry 3 \
            https://raw.githubusercontent.com/bigfoott/ScrapedDuck/data/events.min.json \
            -o docs/data/events.json

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs/data/events.json

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "chore: update Pokemon GO events"
            git push
          fi
