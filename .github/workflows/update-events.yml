name: Update Pokemon GO Events and Calendar

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download event data
        run: |
          mkdir -p docs/data
          curl -fL --retry 3 \
            https://raw.githubusercontent.com/bigfoott/ScrapedDuck/data/events.min.json \
            -o docs/data/events.json

      - name: Generate subscribable calendar
        run: python scripts/generate_calendar.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/events.json docs/calendar.ics
          git diff --cached --quiet || git commit -m "chore: update events and calendar"
          git push
